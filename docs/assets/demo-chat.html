<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>TeamChat — 데모</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: #eaeef2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #dde3e9;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #6a8dff, #8f6aff);
    color: #fff; font-weight: 700; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .peer-name { font-weight: 700; font-size: 15px; color: #1c2733; }
  .peer-status { font-size: 12px; color: #7a8a99; margin-top: 2px; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#34c759; margin-right:4px; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .day-divider {
    align-self: center;
    font-size: 11px; color: #8a97a5;
    background: #dfe6ec;
    padding: 4px 12px; border-radius: 10px;
    margin-bottom: 14px;
  }
  .row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 10px; }
  .row.me { flex-direction: row-reverse; }
  .bubble {
    max-width: 62%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    color: #1c2733;
    background: #fff;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 1px rgba(20,30,40,.06);
  }
  .row.me .bubble {
    background: #3478f6;
    color: #fff;
    border-bottom-left-radius: 18px;
    border-bottom-right-radius: 4px;
  }
  .mini-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #6a8dff, #8f6aff);
    color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .time { font-size: 10px; color: #93a1af; flex-shrink: 0; }
  footer {
    background: #fff;
    border-top: 1px solid #dde3e9;
    padding: 12px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }
  #msg {
    flex: 1;
    border: 1px solid #d4dce4;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
    background: #f7f9fb;
  }
  #msg:focus { border-color: #3478f6; background: #fff; }
  .send {
    width: 38px; height: 38px; border-radius: 50%;
    border: none; background: #3478f6; color: #fff;
    font-size: 16px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
  <header>
    <div class="avatar">A</div>
    <div>
      <div class="peer-name">Alex Kim</div>
      <div class="peer-status"><span class="dot"></span>온라인</div>
    </div>
  </header>
  <main>
    <div class="day-divider">오늘</div>
    <div class="row">
      <div class="mini-avatar">A</div>
      <div class="bubble">Hi! Could you send me a quick summary of today's meeting? I couldn't join the call.</div>
      <div class="time">오전 9:12</div>
    </div>
    <div class="row me">
      <div class="bubble">네, 잠시만요. 정리해서 보내드릴게요 🙂</div>
      <div class="time">오전 9:13</div>
    </div>
    <div class="row">
      <div class="mini-avatar">A</div>
      <div class="bubble">Thanks! Also, the deadline for the design review has been moved to next Friday, so no need to rush.</div>
      <div class="time">오전 9:14</div>
    </div>
  </main>
  <footer>
    <textarea id="msg" rows="1" placeholder="메시지 입력..."></textarea>
    <button class="send" title="보내기">➤</button>
  </footer>
  <script>
    const ta = document.getElementById('msg');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
